# REMOVED — deployment moved to Cloudflare Pages.
# See .github/workflows/deploy-cloudflare.yml
#
# Vercel required 3 account-level secrets and a Vercel account sign-up.
# Cloudflare Pages deploys directly from GitHub with a single CF API token.

#   VERCEL_TOKEN      — from https://vercel.com/account/tokens
#   VERCEL_ORG_ID     — from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID — from .vercel/project.json after `vercel link`
#
# Vercel project env vars (set in Vercel dashboard, NOT here):
#   DEMO_ACCESS_CODE          — your private demo code (server-only)
#   NEXT_PUBLIC_MAP_PROVIDER  — maplibre
#
# NEVER set NEXT_PUBLIC_DEMO_ACCESS_CODE — it leaks into the browser bundle.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: "production"
        type: choice
        options:
          - preview
          - production

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skips silently when Vercel secrets are not yet configured.
    if: ${{ secrets.VERCEL_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Determine target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.environment }}" = "preview" ]; then
            echo "flag=" >> "$GITHUB_OUTPUT"
            echo "env=preview" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--prod" >> "$GITHUB_OUTPUT"
            echo "env=production" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel env
        run: vercel pull --yes --environment=${{ steps.target.outputs.env }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build ${{ steps.target.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt ${{ steps.target.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "- Target: ${{ steps.target.outputs.env }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next step" >> $GITHUB_STEP_SUMMARY
          echo "Share: ${{ steps.deploy.outputs.url }}/client-demo" >> $GITHUB_STEP_SUMMARY
          echo "Smoke: \`\`.\\scripts\\smoke.ps1 -BaseUrl \"${{ steps.deploy.outputs.url }}\"\`\`" >> $GITHUB_STEP_SUMMARY
