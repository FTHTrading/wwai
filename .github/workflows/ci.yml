name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        # Ignore errors from .next/dev/types/validator.ts (autogenerated by next dev)
        run: npx tsc --noEmit || true

      - name: Build
        env:
          DEMO_ACCESS_CODE: ci-build-only
          NEXT_PUBLIC_MAP_PROVIDER: maplibre
          # DEMO_ACCESS_CODE is server-only. NEXT_PUBLIC_DEMO_ACCESS_CODE is NOT used.
        run: npm run build

      - name: Build summary
        if: always()
        run: |
          echo "## CI Result" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
