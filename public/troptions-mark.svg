<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" role="img" aria-label="TROPTIONS">
  <defs>
    <!-- Main gold vertical gradient -->
    <linearGradient id="gv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6B4C0A"/>
      <stop offset="18%"  stop-color="#E8B820"/>
      <stop offset="38%"  stop-color="#FFD700"/>
      <stop offset="55%"  stop-color="#C8860A"/>
      <stop offset="78%"  stop-color="#E8B820"/>
      <stop offset="100%" stop-color="#6B4C0A"/>
    </linearGradient>
    <!-- Stem horizontal gradient for depth -->
    <linearGradient id="gh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4A3205"/>
      <stop offset="25%"  stop-color="#B8860B"/>
      <stop offset="50%"  stop-color="#FFD700"/>
      <stop offset="75%"  stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#4A3205"/>
    </linearGradient>
    <!-- Right T stem — slightly warmer -->
    <linearGradient id="gh2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4A3205"/>
      <stop offset="30%"  stop-color="#C8960C"/>
      <stop offset="55%"  stop-color="#FFD700"/>
      <stop offset="75%"  stop-color="#C8960C"/>
      <stop offset="100%" stop-color="#4A3205"/>
    </linearGradient>
    <!-- Crossbar highlight filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ══ LEFT T ══ -->
  <!-- Crossbar — slight taper at ends -->
  <path d="M4,16 C4,9 9,6 16,6 L106,6 C113,6 116,9 116,16 L116,44 C116,50 113,52 106,52 L16,52 C9,52 4,50 4,44 Z"
        fill="url(#gv)" filter="url(#glow)"/>
  <!-- Serif terminal left -->
  <rect x="4" y="6" width="18" height="9" rx="2" fill="url(#gv)" opacity="0.9"/>
  <!-- Serif terminal right of left T -->
  <rect x="98" y="6" width="18" height="9" rx="2" fill="url(#gv)" opacity="0.9"/>
  <!-- Left stem -->
  <path d="M38,52 L82,52 L82,222 C82,229 77,234 70,234 L50,234 C43,234 38,229 38,222 Z"
        fill="url(#gh)"/>
  <!-- Left stem inner highlight -->
  <rect x="54" y="60" width="10" height="160" rx="2" fill="#FFD700" opacity="0.15"/>

  <!-- ══ RIGHT T (slightly taller — crossbar 6px higher) ══ -->
  <!-- Crossbar -->
  <path d="M104,10 C104,3 109,0 116,0 L206,0 C213,0 216,3 216,10 L216,38 C216,44 213,47 206,47 L116,47 C109,47 104,44 104,38 Z"
        fill="url(#gv)" filter="url(#glow)"/>
  <!-- Serif terminal left of right T -->
  <rect x="104" y="0" width="18" height="9" rx="2" fill="url(#gv)" opacity="0.9"/>
  <!-- Serif terminal right -->
  <rect x="198" y="0" width="18" height="9" rx="2" fill="url(#gv)" opacity="0.9"/>
  <!-- Right stem -->
  <path d="M138,47 L182,47 L182,230 C182,237 177,242 170,242 L150,242 C143,242 138,237 138,230 Z"
        fill="url(#gh2)"/>
  <!-- Right stem inner highlight -->
  <rect x="154" y="55" width="10" height="165" rx="2" fill="#FFD700" opacity="0.15"/>
</svg>
